<!DOCTYPE html>
<!--
  麻雀 点数計算アプリ ── ステップ1：手牌を組む
  ============================================
  このファイル1つでアプリが動きます。
  使い方：このファイルをダブルクリックすると、ブラウザで開きます。

  HTMLファイルは大きく3つの部分でできています：
    1. <style>  … 見た目（色・大きさ・配置）を決める
    2. <body>   … 画面に置く部品（ボタンや文字）
    3. <script> … 動き（タップしたら何が起きるか）を決める
  まずは「動く」ことを体験して、あとから少しずつ意味を理解すればOKです。
-->
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <!-- スマホで見たときに拡大されず、ちょうど良い大きさで表示する設定 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>麻雀 点数計算</title>

  <style>
    /* ===== 全体の見た目 ===== */
    body {
      font-family: sans-serif;
      background: #0b6623;       /* 麻雀卓っぽい緑 */
      color: #fff;
      margin: 0;
      padding: 16px;
      -webkit-user-select: none; /* 長押しで文字が選択されないように */
      user-select: none;
    }
    h1 { font-size: 20px; text-align: center; }
    h2 { font-size: 15px; margin: 16px 0 6px; opacity: 0.85; }

    /* ===== 選んだ手牌を表示する場所 ===== */
    #hand {
      min-height: 56px;
      background: rgba(0,0,0,0.25);
      border-radius: 8px;
      padding: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: center;
    }
    #handCount { text-align: center; margin: 8px 0; font-size: 14px; }

    /* ===== 牌のボタン共通の見た目 ===== */
    .tile {
      background: #f7f7f0;
      color: #111;
      border: 1px solid #999;
      border-radius: 6px;
      width: 40px;
      height: 54px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .tile:active { transform: scale(0.92); } /* 押した瞬間に少し縮む */
    .tile.man { color: #b22222; } /* 萬子は赤っぽく */
    .tile.pin { color: #1560bd; } /* 筒子は青っぽく */
    .tile.sou { color: #2e7d32; } /* 索子は緑っぽく */
    .tile.honor { color: #333; }

    /* 牌を並べる行 */
    .row { display: flex; flex-wrap: wrap; gap: 4px; }

    /* ===== 操作ボタン ===== */
    .actions { display: flex; gap: 8px; margin-top: 16px; }
    .btn {
      flex: 1;
      padding: 12px;
      font-size: 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .btn-clear { background: #c0392b; color: #fff; }
    .btn-wait  { background: #16a085; color: #fff; font-weight: bold; }
    .btn-calc  { background: #f1c40f; color: #111; font-weight: bold; }

    /* ===== 結果表示エリア ===== */
    .result {
      margin-top: 14px;
      background: rgba(0, 0, 0, 0.32);
      border-radius: 8px;
      padding: 12px 14px;
      white-space: pre-wrap;   /* 改行をそのまま表示 */
      font-size: 14px;
      line-height: 1.6;
      min-height: 40px;
    }
    .result:empty::before { content: 'ここに結果が表示されます'; opacity: 0.5; }

    /* ===== 状況入力パネル ===== */
    .cond { background: rgba(0,0,0,0.22); border-radius: 8px; padding: 10px; }
    .cond-row {
      display: flex; flex-wrap: wrap; gap: 12px;
      align-items: center; margin: 8px 0; font-size: 14px;
    }
    .cond-row > span { opacity: 0.85; }
    .cond-row label { display: flex; align-items: center; gap: 4px; cursor: pointer; }
    .cond-row select, .cond-row input[type=number] {
      font-size: 14px; padding: 5px; border-radius: 5px; border: none;
    }
  </style>
</head>

<body>
  <h1>🀄 麻雀 点数計算</h1>

  <!-- 選んだ手牌がここに表示される（最初は空） -->
  <h2>あなたの手牌</h2>
  <div id="hand"></div>
  <div id="handCount">0 / 14 枚</div>

  <!-- 牌を選ぶボタン群。中身は下の<script>が自動で作ります -->
  <h2>牌を選んでタップ</h2>
  <div id="palette"></div>

  <!-- 写真に写らない情報は、ここで手入力する -->
  <h2>あがりの状況</h2>
  <div class="cond">
    <div class="cond-row">
      <span>あがり方</span>
      <label><input type="radio" name="agari" value="tsumo" checked> ツモ</label>
      <label><input type="radio" name="agari" value="ron"> ロン</label>
    </div>
    <div class="cond-row">
      <label><input type="checkbox" id="riichi"> リーチ</label>
      <label><input type="checkbox" id="ippatsu"> 一発</label>
    </div>
    <div class="cond-row">
      <label><input type="checkbox" id="rinshan"> 嶺上開花（カン後のツモあがり）</label>
    </div>
    <div class="cond-row">
      <span>場風</span>
      <select id="roundWind"><option value="東">東</option><option value="南">南</option></select>
      <span>自風</span>
      <select id="seatWind"><option>東</option><option>南</option><option>西</option><option>北</option></select>
    </div>
    <div class="cond-row">
      <span>あがり牌</span>
      <select id="winTile"></select>
      <span>ドラ</span>
      <input type="number" id="dora" value="0" min="0" style="width: 54px;">
    </div>
  </div>

  <!-- 鳴き（ポン・チー）の宣言エリア。宣言した面子は「明（オープン）」扱い -->
  <h2>鳴き（ポン・チー）</h2>
  <div class="cond">
    <div class="cond-row">
      <select id="callTile"></select>
      <select id="callType">
        <option value="pon">ポン（明刻・同じ牌3枚）</option>
        <option value="chi">チー（明順・選んだ牌から3連番）</option>
      </select>
      <button class="btn" style="flex:0 0 auto; padding:6px 12px; background:#8e44ad; color:#fff;" onclick="addCall()">鳴き追加</button>
    </div>
    <div id="callList" style="font-size: 14px;"></div>
  </div>

  <!-- カン（槓）の宣言エリア。ここで宣言したカンは手牌タップとは別に管理する -->
  <h2>カン（槓）</h2>
  <div class="cond">
    <div class="cond-row">
      <select id="kanTile"></select>
      <select id="kanType">
        <option value="ankan">暗槓（自分で4枚そろえた）</option>
        <option value="minkan">明槓（鳴いた / 加槓）</option>
      </select>
      <button class="btn" style="flex:0 0 auto; padding:6px 12px; background:#2980b9; color:#fff;" onclick="addKan()">カン追加</button>
    </div>
    <div id="kanList" style="font-size: 14px;"></div>
  </div>

  <div class="actions">
    <button class="btn btn-clear" onclick="clearHand()">全部消す</button>
    <button class="btn btn-wait"  onclick="checkWaits()">待ちを調べる</button>
    <button class="btn btn-calc"  onclick="calculate()">点数計算</button>
  </div>

  <!-- 計算結果はここに表示する（ポップアップではなく画面内） -->
  <div id="result" class="result"></div>

  <script>
    // ===== ① どんな牌があるかを準備する =====
    // m=萬子, p=筒子, s=索子。数字の1〜9と組み合わせる。
    // z=字牌（東南西北白發中）。
    const suits = [
      { key: 'm', label: '萬', cls: 'man' },
      { key: 'p', label: '筒', cls: 'pin' },
      { key: 's', label: '索', cls: 'sou' },
    ];
    const honors = ['東','南','西','北','白','發','中'];

    // 選んだ手牌をしまっておく箱（最初は空っぽの配列）
    let hand = [];
    // 宣言したカンをしまっておく箱（{idx:牌番号, type:'ankan'|'minkan'}）
    let kans = [];
    // 宣言した鳴き（ポン・チー）をしまっておく箱（{type:'kotsu'|'shuntsu', idx}）
    let calls = [];

    // 完成手に必要な手牌の枚数（宣言した面子1組につき3枚減る）
    function neededTiles() { return 14 - 3 * (kans.length + calls.length); }

    // ある牌が今いくつ使われているか（手牌＋カン＋鳴きを合算）
    function tileCount(idx) {
      let c = hand.filter(n => nameToIndex(n) === idx).length;
      c += kans.filter(k => k.idx === idx).length * 4;          // カンは1組4枚
      calls.forEach(call => {
        if (call.type === 'kotsu') { if (call.idx === idx) c += 3; }      // ポン＝同じ牌3枚
        else { if (idx === call.idx || idx === call.idx + 1 || idx === call.idx + 2) c += 1; } // チー＝3連番
      });
      return c;
    }

    // ===== ② 牌を選ぶボタンを画面に並べる =====
    const palette = document.getElementById('palette');

    // 萬子・筒子・索子（1〜9）をそれぞれ1行ずつ作る
    suits.forEach(suit => {
      const row = document.createElement('div');
      row.className = 'row';
      for (let n = 1; n <= 9; n++) {
        const btn = document.createElement('button');
        btn.className = 'tile ' + suit.cls;
        btn.textContent = n + suit.label;          // 例：「1萬」
        btn.onclick = () => addTile(n + suit.label); // タップしたら手牌に追加
        row.appendChild(btn);
      }
      palette.appendChild(row);
    });

    // 字牌の行
    const honorRow = document.createElement('div');
    honorRow.className = 'row';
    honors.forEach(name => {
      const btn = document.createElement('button');
      btn.className = 'tile honor';
      btn.textContent = name;
      btn.onclick = () => addTile(name);
      honorRow.appendChild(btn);
    });
    palette.appendChild(honorRow);

    // カン用・鳴き用プルダウンに全34種の牌を入れておく
    const allTileNames = [];
    suits.forEach(s => { for (let n = 1; n <= 9; n++) allTileNames.push(n + s.label); });
    honors.forEach(h => allTileNames.push(h));
    ['kanTile', 'callTile'].forEach(id => {
      const sel = document.getElementById(id);
      allTileNames.forEach(name => {
        const o = document.createElement('option');
        o.value = name; o.textContent = name;
        sel.appendChild(o);
      });
    });

    // ===== ③ タップしたときの動き =====
    function addTile(name) {
      // 同じ牌は4枚まで（カンで使った牌ぶんも合算してチェック）
      if (tileCount(nameToIndex(name)) >= 4) {
        alert(name + ' はすでに4枚使われています（同じ牌は4枚まで）');
        return;
      }
      if (hand.length >= neededTiles()) {
        alert('手牌は ' + neededTiles() + ' 枚までです（カン宣言ぶん減っています）');
        return;
      }
      hand.push(name);  // 手牌の箱に1枚追加
      render();         // 画面を描き直す
    }

    // ===== カンの追加・削除 =====
    function addKan() {
      if (kans.length >= 4) { alert('カンは最大4つまでです'); return; }
      const name = document.getElementById('kanTile').value;
      const type = document.getElementById('kanType').value;
      const idx = nameToIndex(name);
      // カンは未使用の牌4枚が必要。すでに手牌やカンで使っていたら不可
      if (tileCount(idx) > 0) {
        alert(name + ' はすでに使われているため、カンにできません。\n（カンはその牌4枚すべてが必要です。先に手牌から ' + name + ' を外してください）');
        return;
      }
      kans.push({ idx, type });
      // 手牌がはみ出さないよう、必要枚数を超える手牌は末尾から削る
      while (hand.length > neededTiles()) hand.pop();
      renderKans();
      render();
    }
    function removeKan(i) { kans.splice(i, 1); renderKans(); render(); }
    function renderKans() {
      const div = document.getElementById('kanList');
      div.innerHTML = '';
      if (kans.length === 0) { div.textContent = '（カンなし）'; return; }
      kans.forEach((k, i) => {
        const span = document.createElement('span');
        span.style.cssText = 'display:inline-block;margin:3px;padding:5px 9px;background:rgba(255,255,255,0.18);border-radius:6px;cursor:pointer;';
        span.textContent = indexToName(k.idx) + '×4 ' + (k.type === 'ankan' ? '暗槓' : '明槓') + '　✕';
        span.title = 'クリックで削除';
        span.onclick = () => removeKan(i);
        div.appendChild(span);
      });
    }

    // ===== 鳴き（ポン・チー）の追加・削除 =====
    function addCall() {
      if (kans.length + calls.length >= 4) { alert('面子は合計4つまでです'); return; }
      const name = document.getElementById('callTile').value;
      const kind = document.getElementById('callType').value;
      const idx = nameToIndex(name);
      if (kind === 'pon') {
        // ポン：同じ牌が3枚必要（残り枚数が足りるか確認）
        if (tileCount(idx) > 1) { alert(name + ' は残り枚数が足りず、ポンにできません'); return; }
        calls.push({ type: 'kotsu', idx });
      } else {
        // チー：選んだ牌から3連番（数牌で1〜7始まりのみ）
        if (idx >= 27 || idx % 9 > 6) { alert('チーは数牌の1〜7から始まる3連番のみです（例：3萬で 3-4-5萬）'); return; }
        if (tileCount(idx) > 3 || tileCount(idx + 1) > 3 || tileCount(idx + 2) > 3) {
          alert('その3連番は残り枚数が足りず、チーにできません'); return;
        }
        calls.push({ type: 'shuntsu', idx });
      }
      while (hand.length > neededTiles()) hand.pop();
      renderCalls();
      render();
    }
    function removeCall(i) { calls.splice(i, 1); renderCalls(); render(); }
    function renderCalls() {
      const div = document.getElementById('callList');
      div.innerHTML = '';
      if (calls.length === 0) { div.textContent = '（鳴きなし）'; return; }
      calls.forEach((c, i) => {
        const span = document.createElement('span');
        span.style.cssText = 'display:inline-block;margin:3px;padding:5px 9px;background:rgba(255,255,255,0.18);border-radius:6px;cursor:pointer;';
        const label = c.type === 'kotsu'
          ? 'ポン ' + indexToName(c.idx).repeat(3)
          : 'チー ' + indexToName(c.idx) + '-' + indexToName(c.idx + 1) + '-' + indexToName(c.idx + 2);
        span.textContent = label + '　✕';
        span.title = 'クリックで削除';
        span.onclick = () => removeCall(i);
        div.appendChild(span);
      });
    }

    // 手牌の中の牌をタップしたら、その1枚を取り除く
    function removeTile(index) {
      hand.splice(index, 1);
      render();
    }

    function clearHand() {
      hand = [];
      kans = [];
      calls = [];
      renderKans();
      renderCalls();
      render();
    }

    // 門前かどうか（ポン・チーの宣言がなく、明槓もない）を判定
    function isMenzen() {
      return calls.length === 0 && !kans.some(k => k.type === 'minkan');
    }

    // --- 牌の名前から、色分け用のクラス名を返す ---
    //   "3萬"→man(赤) / "5筒"→pin(青) / "7索"→sou(緑) / 字牌→honor(黒)
    function suitClass(name) {
      if (name[1] === '萬') return 'man';
      if (name[1] === '筒') return 'pin';
      if (name[1] === '索') return 'sou';
      return 'honor';
    }

    // ===== ④ 今の手牌を画面に表示する =====
    function render() {
      const handDiv = document.getElementById('hand');
      handDiv.innerHTML = ''; // いったん空にしてから並べ直す
      hand.forEach((name, index) => {
        const t = document.createElement('button');
        t.className = 'tile ' + suitClass(name); // パレットと同じ色分けを付ける
        t.textContent = name;
        t.title = 'タップで削除';
        t.onclick = () => removeTile(index);
        handDiv.appendChild(t);
      });
      const declared = kans.length + calls.length;
      document.getElementById('handCount').textContent =
        hand.length + ' / ' + neededTiles() + ' 枚' +
        (declared ? '（宣言した面子' + declared + '組ぶん減算）' : '');

      // 門前でないときは、リーチ・一発を無効化（門前限定のため）
      const menzen = isMenzen();
      const r = document.getElementById('riichi'), ip = document.getElementById('ippatsu');
      if (!menzen) { r.checked = false; ip.checked = false; }
      r.disabled = !menzen; ip.disabled = !menzen;

      // 「あがり牌」の選択肢を、今の手牌から作る（重複は1つにまとめる）
      const winSel = document.getElementById('winTile');
      const prev = winSel.value;                 // 今選ばれている値を覚えておく
      const uniq = [...new Set(hand)];           // 手牌の中の種類だけ取り出す
      winSel.innerHTML = '';
      uniq.forEach(name => {
        const opt = document.createElement('option');
        opt.value = name; opt.textContent = name;
        winSel.appendChild(opt);
      });
      // さっき選んでいた牌がまだ手牌にあれば、それを選び直す
      if (uniq.includes(prev)) winSel.value = prev;
    }

    // ============================================================
    //  ⑤ 和了形（あがれる形）の判定エンジン  ── ステップ2a
    // ============================================================
    //  考え方：
    //    麻雀の和了形は「4面子（メンツ）＋1雀頭（ジャントウ）」が基本。
    //      ・面子＝刻子(コーツ:同じ牌3枚) または 順子(シュンツ:連番3枚)
    //      ・雀頭＝同じ牌2枚
    //    例外として「七対子(2枚ペア×7)」「国士無双」もあがり形。
    //    14枚をこの形にうまく分解できれば「和了」と判定します。

    // --- 牌の名前(例"3萬","東")を、計算しやすい番号(0〜33)に変換する ---
    //   0〜8 =1萬〜9萬 / 9〜17 =1筒〜9筒 / 18〜26 =1索〜9索 / 27〜33 =東南西北白發中
    const honorNames = ['東','南','西','北','白','發','中'];
    function nameToIndex(name) {
      const suitOffset = { '萬': 0, '筒': 9, '索': 18 };
      if (name.length === 2 && suitOffset[name[1]] !== undefined) {
        return suitOffset[name[1]] + (Number(name[0]) - 1);
      }
      return 27 + honorNames.indexOf(name); // 字牌
    }
    // --- 逆に、番号を名前に戻す（表示用）---
    function indexToName(i) {
      if (i >= 27) return honorNames[i - 27];
      const suit = ['萬','筒','索'][Math.floor(i / 9)];
      return (i % 9 + 1) + suit;
    }

    // --- 手牌を「各牌が何枚あるか」の34マスの一覧に変換 ---
    function toCounts(handArr) {
      const counts = new Array(34).fill(0);
      handArr.forEach(name => counts[nameToIndex(name)]++);
      return counts;
    }

    // --- 残りの牌を、面子だけにきれいに分解できるか試す（再帰）---
    //   できる分解パターンを out に全部ためる
    function decomposeMelds(counts, start, current, out) {
      let i = start;
      while (i < 34 && counts[i] === 0) i++; // 牌が残っている最初の位置を探す
      if (i >= 34) { out.push(current.map(m => ({...m}))); return; } // 全部きれいに分解できた

      // パターン1：刻子（同じ牌3枚）として取り除いてみる
      if (counts[i] >= 3) {
        counts[i] -= 3;
        current.push({ type: 'kotsu', idx: i });
        decomposeMelds(counts, i, current, out);
        current.pop();
        counts[i] += 3;
      }
      // パターン2：順子（連番3枚）として取り除いてみる（数牌で、同じ種類に収まる時だけ）
      const isSuited = i < 27;
      const posInSuit = i % 9;
      if (isSuited && posInSuit <= 6 && counts[i + 1] > 0 && counts[i + 2] > 0) {
        counts[i]--; counts[i + 1]--; counts[i + 2]--;
        current.push({ type: 'shuntsu', idx: i });
        decomposeMelds(counts, i, current, out);
        current.pop();
        counts[i]++; counts[i + 1]++; counts[i + 2]++;
      }
    }

    // --- 標準形（4面子1雀頭）として分解できるパターンを全部探す ---
    function findStandardWins(counts) {
      const results = [];
      for (let p = 0; p < 34; p++) {        // どの牌を雀頭にするか順に試す
        if (counts[p] >= 2) {
          const c = counts.slice();
          c[p] -= 2;                        // 雀頭として2枚取り除く
          const melds = [];
          decomposeMelds(c, 0, [], melds);
          melds.forEach(m => results.push({ pair: p, melds: m }));
        }
      }
      return results;
    }

    // --- 七対子（同じ牌2枚のペアが7種類）か判定 ---
    function isChiitoitsu(counts) {
      return counts.filter(n => n === 2).length === 7;
    }
    // --- 国士無双（1・9・字牌の13種を全部＋どれか1枚重ね）か判定 ---
    function isKokushi(counts) {
      const yaochu = [0,8,9,17,18,26,27,28,29,30,31,32,33]; // 老頭牌＋字牌
      const others = counts.reduce((sum, n, i) => sum + (yaochu.includes(i) ? 0 : n), 0);
      if (others > 0) return false;                       // それ以外の牌があったら×
      const kinds = yaochu.filter(i => counts[i] >= 1).length;
      const pair  = yaochu.some(i => counts[i] === 2);
      return kinds === 13 && pair;
    }

    // --- 分解結果を読みやすい文章にする ---
    function describeWin(win) {
      const parts = [];
      parts.push('雀頭：' + indexToName(win.pair) + indexToName(win.pair));
      win.melds.forEach(m => {
        if (m.type === 'kotsu') {
          parts.push('刻子：' + indexToName(m.idx).repeat(3));
        } else {
          parts.push('順子：' + indexToName(m.idx) + '-' + indexToName(m.idx + 1) + '-' + indexToName(m.idx + 2));
        }
      });
      return parts.join('\n');
    }

    // ============================================================
    //  ⑥ 役判定エンジン  ── ステップ2b
    // ============================================================
    //  ※ いまは「門前（鳴きなし）」前提。鳴きは後のステップで対応します。

    const WIND_IDX = { '東': 27, '南': 28, '西': 29, '北': 30 }; // 風牌の番号

    // 翻数を合計する小さな道具
    function sumHan(list) { return list.reduce((s, y) => s + y.han, 0); }

    // 画面の入力をまとめて1つの「状況オブジェクト」にする
    function getContext() {
      const agari = document.querySelector('input[name=agari]:checked').value;
      return {
        tsumo:     agari === 'tsumo',
        ron:       agari === 'ron',
        riichi:    document.getElementById('riichi').checked,
        ippatsu:   document.getElementById('ippatsu').checked,
        rinshan:   document.getElementById('rinshan').checked,
        roundWind: document.getElementById('roundWind').value,
        seatWind:  document.getElementById('seatWind').value,
        winIdx:    nameToIndex(document.getElementById('winTile').value),
        dora:      Number(document.getElementById('dora').value) || 0,
        // ポン・チーの宣言、または明槓があれば門前でない（暗槓は門前を維持）
        menzen:    isMenzen(),
      };
    }

    // 1つの分解（win）に含まれる牌の番号を全部ならべた配列を作る
    //   ※ カンも刻子と同じく「同じ牌の集まり」として扱う（性質判定には3枚ぶんで十分）
    function tilesOf(win) {
      const all = [];
      win.melds.forEach(m => {
        if (m.type === 'shuntsu') all.push(m.idx, m.idx + 1, m.idx + 2);
        else all.push(m.idx, m.idx, m.idx); // kotsu と kan
      });
      all.push(win.pair, win.pair);
      return all;
    }
    const isYaochu = i => i >= 27 || i % 9 === 0 || i % 9 === 8; // 1・9・字牌か

    // 暗刻（＋暗槓）の数を数える。ロンで完成した刻子は暗刻に含めない
    function countAnkou(win, ctx) {
      let ankou = 0;
      const inShuntsu = win.melds.some(m => m.type === 'shuntsu' &&
        ctx.winIdx >= m.idx && ctx.winIdx <= m.idx + 2);
      win.melds.forEach(m => {
        if (m.type === 'kan') { if (m.concealed) ankou++; return; } // 暗槓は暗刻扱い
        if (m.type !== 'kotsu') return;
        if (m.open) return;                                         // ポン（明刻）は暗刻でない
        let concealed = true;
        if (ctx.ron && !inShuntsu && m.idx === ctx.winIdx) concealed = false; // ロンで完成＝明刻
        if (concealed) ankou++;
      });
      return ankou;
    }

    // --- 標準形（4面子1雀頭）の役満を判定 ---
    function analyzeYakuman(win, ctx) {
      const ym = [];
      const all = tilesOf(win);
      const triplets = win.melds.filter(m => m.type === 'kotsu' || m.type === 'kan'); // 刻子＋カン
      if (ctx.menzen && countAnkou(win, ctx) === 4) ym.push({ name: '四暗刻', han: 13 });
      if (triplets.filter(k => k.idx >= 31).length === 3) ym.push({ name: '大三元', han: 13 });
      const windKotsu = triplets.filter(k => k.idx >= 27 && k.idx <= 30).length;
      if (windKotsu === 4) ym.push({ name: '大四喜', han: 13 });
      else if (windKotsu === 3 && win.pair >= 27 && win.pair <= 30) ym.push({ name: '小四喜', han: 13 });
      if (win.melds.filter(m => m.type === 'kan').length === 4) ym.push({ name: '四槓子', han: 13 });
      if (all.every(i => i >= 27)) ym.push({ name: '字一色', han: 13 });
      if (all.every(i => i < 27 && (i % 9 === 0 || i % 9 === 8))) ym.push({ name: '清老頭', han: 13 });
      const greens = new Set([19, 20, 21, 23, 25, 32]); // 2,3,4,6,8索 と 發
      if (all.every(i => greens.has(i))) ym.push({ name: '緑一色', han: 13 });
      return ym;
    }

    // --- 標準形の通常役を判定して、役の一覧を返す ---
    function analyzeStandard(win, ctx) {
      const yaku = [];
      const shuntsu = win.melds.filter(m => m.type === 'shuntsu');
      const kotsu   = win.melds.filter(m => m.type === 'kotsu');
      const triplets = win.melds.filter(m => m.type === 'kotsu' || m.type === 'kan'); // 刻子＋カン
      const kanCount = win.melds.filter(m => m.type === 'kan').length;
      const all = tilesOf(win);

      // 門前の手役（鳴きありでは付かない）
      if (ctx.menzen && ctx.riichi) yaku.push({ name: '立直', han: 1 });
      if (ctx.menzen && ctx.riichi && ctx.ippatsu) yaku.push({ name: '一発', han: 1 });
      if (ctx.menzen && ctx.tsumo) yaku.push({ name: '門前清自摸和', han: 1 });

      // 嶺上開花（カン後のツモあがり）
      if (ctx.rinshan && ctx.tsumo) yaku.push({ name: '嶺上開花', han: 1 });

      // 断么九（タンヤオ）
      if (all.every(i => !isYaochu(i))) yaku.push({ name: '断么九', han: 1 });

      // 役牌（白・發・中・場風・自風）※カンも刻子と同じ扱い
      triplets.forEach(k => {
        if (k.idx === 31) yaku.push({ name: '役牌 白', han: 1 });
        if (k.idx === 32) yaku.push({ name: '役牌 發', han: 1 });
        if (k.idx === 33) yaku.push({ name: '役牌 中', han: 1 });
        if (k.idx === WIND_IDX[ctx.roundWind]) yaku.push({ name: '場風 ' + ctx.roundWind, han: 1 });
        if (k.idx === WIND_IDX[ctx.seatWind])  yaku.push({ name: '自風 ' + ctx.seatWind, han: 1 });
      });

      // 平和（門前・全部順子・雀頭が役牌でない・両面待ち）
      const pairYakuhai = win.pair >= 31 ||
        win.pair === WIND_IDX[ctx.roundWind] || win.pair === WIND_IDX[ctx.seatWind];
      if (ctx.menzen && shuntsu.length === 4 && !pairYakuhai) {
        let ryanmen = false;
        shuntsu.forEach(s => {
          const a = s.idx, c = s.idx + 2;
          if (ctx.winIdx === a && a % 9 !== 6) ryanmen = true; // 下端で完成
          if (ctx.winIdx === c && a % 9 !== 0) ryanmen = true; // 上端で完成
        });
        if (ryanmen) yaku.push({ name: '平和', han: 1 });
      }

      // 一盃口 / 二盃口（同じ順子の重なり）
      const seqCount = {};
      shuntsu.forEach(s => seqCount[s.idx] = (seqCount[s.idx] || 0) + 1);
      const seqPairs = Object.values(seqCount).reduce((n, c) => n + Math.floor(c / 2), 0);
      if (ctx.menzen) {
        if (seqPairs >= 2) yaku.push({ name: '二盃口', han: 3 });
        else if (seqPairs === 1) yaku.push({ name: '一盃口', han: 1 });
      }

      // 三色同順（同じ並びが3色そろう）
      const posSuits = {};
      shuntsu.forEach(s => {
        (posSuits[s.idx % 9] = posSuits[s.idx % 9] || new Set()).add(Math.floor(s.idx / 9));
      });
      if (Object.values(posSuits).some(set => set.size >= 3)) yaku.push({ name: '三色同順', han: ctx.menzen ? 2 : 1 });

      // 一気通貫（同じ色で123・456・789）
      for (let suit = 0; suit < 3; suit++) {
        const base = suit * 9;
        const has = p => shuntsu.some(s => s.idx === base + p);
        if (has(0) && has(3) && has(6)) { yaku.push({ name: '一気通貫', han: ctx.menzen ? 2 : 1 }); break; }
      }

      // 対々和（順子が1つもない＝4面子すべて刻子/カン）
      if (shuntsu.length === 0) yaku.push({ name: '対々和', han: 2 });

      // 三暗刻（鳴き面子を宣言するので、鳴き手でも暗刻を正しく数えられる）
      if (countAnkou(win, ctx) === 3) yaku.push({ name: '三暗刻', han: 2 });

      // 三槓子（カンが3つ）
      if (kanCount === 3) yaku.push({ name: '三槓子', han: 2 });

      // 一色系（混一色・清一色）
      const suitsUsed = new Set(); let hasHonor = false;
      all.forEach(i => { if (i >= 27) hasHonor = true; else suitsUsed.add(Math.floor(i / 9)); });
      if (suitsUsed.size === 1 && !hasHonor) yaku.push({ name: '清一色', han: ctx.menzen ? 6 : 5 });
      else if (suitsUsed.size === 1 && hasHonor) yaku.push({ name: '混一色', han: ctx.menzen ? 3 : 2 });

      // チャンタ・純チャン・混老頭（カンは刻子と同じ扱い）
      const meldYaochu = win.melds.every(m => m.type === 'shuntsu'
        ? (m.idx % 9 === 0 || m.idx % 9 === 6) : isYaochu(m.idx));
      if (meldYaochu && isYaochu(win.pair)) {
        const allYaochu = all.every(isYaochu);
        if (allYaochu && hasHonor) yaku.push({ name: '混老頭', han: 2 });
        else if (shuntsu.length > 0) {
          yaku.push(hasHonor ? { name: '混全帯么九(チャンタ)', han: ctx.menzen ? 2 : 1 }
                             : { name: '純全帯么九(純チャン)', han: ctx.menzen ? 3 : 2 });
        }
      }

      // 小三元（三元牌の刻子/カンが2つ＋三元牌の雀頭）
      if (triplets.filter(k => k.idx >= 31).length === 2 && win.pair >= 31)
        yaku.push({ name: '小三元', han: 2 });

      return yaku;
    }

    // --- 七対子の形のときの役を判定 ---
    function analyzeChiitoi(counts, ctx) {
      const yaku = [{ name: '七対子', han: 2 }];
      if (ctx.riichi) yaku.unshift({ name: '立直', han: 1 });
      if (ctx.riichi && ctx.ippatsu) yaku.push({ name: '一発', han: 1 });
      if (ctx.tsumo) yaku.push({ name: '門前清自摸和', han: 1 });
      const idxs = []; counts.forEach((c, i) => { if (c === 2) idxs.push(i); });
      if (idxs.every(i => !isYaochu(i))) yaku.push({ name: '断么九', han: 1 });
      const suitsUsed = new Set(); let hasHonor = false;
      idxs.forEach(i => { if (i >= 27) hasHonor = true; else suitsUsed.add(Math.floor(i / 9)); });
      if (suitsUsed.size === 1 && !hasHonor) yaku.push({ name: '清一色', han: 6 });
      else if (suitsUsed.size === 1 && hasHonor) yaku.push({ name: '混一色', han: 3 });
      if (idxs.every(isYaochu) && hasHonor) yaku.push({ name: '混老頭', han: 2 });
      return yaku;
    }

    // --- 九蓮宝燈の判定（清一色の特殊形）---
    function isChuuren(counts) {
      for (let suit = 0; suit < 3; suit++) {
        const base = suit * 9;
        const inSuit = counts.slice(base, base + 9).reduce((a, b) => a + b, 0);
        const others = counts.reduce((a, b) => a + b, 0) - inSuit;
        if (inSuit === 14 && others === 0) {
          const need = [3, 1, 1, 1, 1, 1, 1, 1, 3];
          let extra = 0, ok = true;
          for (let k = 0; k < 9; k++) {
            const diff = counts[base + k] - need[k];
            if (diff < 0) { ok = false; break; }
            extra += diff;
          }
          if (ok && extra === 1) return true;
        }
      }
      return false;
    }

    // ============================================================
    //  ⑦ 符の計算  ── ステップ2c
    // ============================================================
    //  符 = 20（副底）＋ あがり方 ＋ 雀頭 ＋ 刻子 ＋ 待ち、最後に10の位へ切り上げ
    function computeFu(win, ctx, yakuNames) {
      // 内訳(breakdown)を作りながら符を足していき、{fu, breakdown} を返す
      const bd = [];

      // 平和は特別：ツモ20符、ロン30符で固定
      if (yakuNames.includes('平和')) {
        if (ctx.tsumo) return { fu: 20, breakdown: ['平和ツモ（20符固定）'] };
        return { fu: 30, breakdown: ['副底 20符', '門前ロン +10符'] };
      }

      let fu = 20; bd.push('副底 20符');        // 副底（必ず付く20符）
      if (ctx.ron && ctx.menzen) { fu += 10; bd.push('門前ロン +10符'); }
      if (ctx.tsumo) { fu += 2; bd.push('ツモ +2符'); }

      // 雀頭が役牌なら +2（連風牌なら場風＋自風で+4になりうる）
      if (win.pair >= 31) { fu += 2; bd.push('役牌の雀頭(三元牌) +2符'); }
      if (win.pair === WIND_IDX[ctx.roundWind]) { fu += 2; bd.push('場風の雀頭 +2符'); }
      if (win.pair === WIND_IDX[ctx.seatWind]) { fu += 2; bd.push('自風の雀頭 +2符'); }

      // 刻子の符（中張=2-8 / 么九=1-9字、暗刻か明刻か）
      win.melds.filter(m => m.type === 'kotsu').forEach(k => {
        let open = k.open || false; // ポン（明刻）は最初から明刻。ロンで完成した刻子も明刻扱い
        if (!open && ctx.ron) {
          const inShuntsu = win.melds.some(m => m.type === 'shuntsu' &&
            ctx.winIdx >= m.idx && ctx.winIdx <= m.idx + 2);
          if (!inShuntsu && k.idx === ctx.winIdx) open = true;
        }
        const v = isYaochu(k.idx) ? (open ? 4 : 8) : (open ? 2 : 4);
        fu += v;
        bd.push((open ? '明刻' : '暗刻') + '(' + indexToName(k.idx) +
                '・' + (isYaochu(k.idx) ? '么九' : '中張') + ') +' + v + '符');
      });

      // 槓子の符（刻子の4倍が目安。暗槓は明槓の倍）
      win.melds.filter(m => m.type === 'kan').forEach(k => {
        const v = k.concealed ? (isYaochu(k.idx) ? 32 : 16) : (isYaochu(k.idx) ? 16 : 8);
        fu += v;
        bd.push((k.concealed ? '暗槓' : '明槓') + '(' + indexToName(k.idx) +
                '・' + (isYaochu(k.idx) ? '么九' : '中張') + ') +' + v + '符');
      });

      // 待ちの符（単騎・嵌張・辺張は +2、両面・シャンポンは 0）
      let waitFu = 0, waitLabel = '';
      if (ctx.winIdx === win.pair) { waitFu = 2; waitLabel = '単騎待ち'; }
      win.melds.filter(m => m.type === 'shuntsu').forEach(s => {
        const a = s.idx;
        if (waitFu === 0 && ctx.winIdx === a + 1) { waitFu = 2; waitLabel = '嵌張待ち'; }              // 嵌張（中）
        if (waitFu === 0 && ctx.winIdx === a + 2 && a % 9 === 0) { waitFu = 2; waitLabel = '辺張待ち'; } // 辺張 123の3
        if (waitFu === 0 && ctx.winIdx === a && a % 9 === 6) { waitFu = 2; waitLabel = '辺張待ち'; }     // 辺張 789の7
      });
      if (waitFu > 0) { fu += waitFu; bd.push(waitLabel + ' +' + waitFu + '符'); }
      else            { bd.push('両面/シャンポン待ち +0符'); }

      const raw = fu;
      fu = Math.ceil(fu / 10) * 10;             // 10の位へ切り上げ
      if (raw !== fu) bd.push('小計 ' + raw + '符 → 切り上げ ' + fu + '符');
      if (!ctx.menzen && fu < 30) { fu = 30; bd.push('鳴き手の最低符 → 30符'); } // 鳴き手の最低符は30符
      return { fu, breakdown: bd };
    }

    // ============================================================
    //  ⑧ 翻数と符から最終点数を計算
    // ============================================================
    function computePoints(han, fu, isDealer, tsumo) {
      // 基本点(base)を求める
      let base, limitName = '';
      if (han >= 13)      { base = 8000 * Math.floor(han / 13); limitName = (han >= 26 ? Math.floor(han / 13) + '倍' : '') + '役満'; }
      else if (han >= 11) { base = 6000; limitName = '三倍満'; }
      else if (han >= 8)  { base = 4000; limitName = '倍満'; }
      else if (han >= 6)  { base = 3000; limitName = '跳満'; }
      else if (han >= 5)  { base = 2000; limitName = '満貫'; }
      else {
        base = fu * Math.pow(2, 2 + han);
        if (base >= 2000) { base = 2000; limitName = '満貫'; } // 満貫止め
      }

      const up = x => Math.ceil(x / 100) * 100; // 100点単位に切り上げ
      let text, total;
      if (isDealer) {
        if (tsumo) { const e = up(base * 2); total = e * 3; text = '親ツモ：' + e + '点オール（計 ' + total + '点）'; }
        else       { total = up(base * 6); text = '親ロン：' + total + '点'; }
      } else {
        if (tsumo) { const ko = up(base), oya = up(base * 2); total = oya + ko * 2;
                     text = '子ツモ：親が ' + oya + '点／子が ' + ko + '点ずつ（計 ' + total + '点）'; }
        else       { total = up(base * 4); text = '子ロン：' + total + '点'; }
      }
      return { text, total, limitName };
    }

    // 宣言したカン・鳴きを、完成手の面子オブジェクトに変換する
    function buildDeclaredMelds() {
      const kanMelds  = kans.map(k => ({ type: 'kan', idx: k.idx, concealed: k.type === 'ankan' }));
      const callMelds = calls.map(c => ({ type: c.type, idx: c.idx, open: true })); // 鳴き＝明（オープン）
      return kanMelds.concat(callMelds);
    }

    // ============================================================
    //  ⑨ 完成手の判定（役・符・点数）── 点数計算と待ち調べの共通エンジン
    // ============================================================
    //  返り値の type: 'yakuman' | 'normal' | 'none'
    function scoreComplete(counts, declaredMelds, noDeclared, ctx) {
      const isDealer = ctx.seatWind === '東';
      const wins = findStandardWins(counts).map(w => ({ pair: w.pair, melds: w.melds.concat(declaredMelds) }));

      // 役満
      const yakuman = [];
      if (noDeclared && isKokushi(counts)) yakuman.push({ name: '国士無双', han: 13 });
      if (noDeclared && isChuuren(counts)) yakuman.push({ name: '九蓮宝燈', han: 13 });
      let bestYm = [];
      wins.forEach(w => { const ym = analyzeYakuman(w, ctx); if (sumHan(ym) > sumHan(bestYm)) bestYm = ym; });
      const allYm = yakuman.concat(bestYm);
      if (allYm.length > 0) {
        const han = sumHan(allYm);
        return { type: 'yakuman', yaku: allYm, han, pts: computePoints(han, 0, isDealer, ctx.tsumo) };
      }

      // 通常役（候補ごとに計算し、最高点を採用）
      let best = null;
      function consider(yaku, fuRes) {
        if (yaku.length === 0) return;
        const han = sumHan(yaku) + ctx.dora;
        const pts = computePoints(han, fuRes.fu, isDealer, ctx.tsumo);
        if (!best || pts.total > best.pts.total) best = { yaku, fu: fuRes.fu, breakdown: fuRes.breakdown, han, pts };
      }
      if (noDeclared && isChiitoitsu(counts))
        consider(analyzeChiitoi(counts, ctx), { fu: 25, breakdown: ['七対子（25符固定）'] });
      wins.forEach(w => {
        const yaku = analyzeStandard(w, ctx);
        consider(yaku, computeFu(w, ctx, yaku.map(y => y.name)));
      });

      if (best) return Object.assign({ type: 'normal' }, best);
      // 役は無いが「あがり形」ではあるか？
      const isWin = wins.length > 0 || (noDeclared && isChiitoitsu(counts));
      return { type: 'none', isWin };
    }

    // 結果を画面内の result 欄に表示する（ポップアップの代わり）
    function showResult(msg) {
      document.getElementById('result').textContent = msg;
    }

    // ===== ボタン：点数計算 =====
    function calculate() {
      const ctx = getContext();
      const need = neededTiles();
      if (hand.length !== need) {
        showResult('点数計算には、手牌（タップぶん）が ' + need + ' 枚必要です。\n今：' + hand.length + '枚' +
              (kans.length || calls.length ? '\n（宣言した面子ぶん、必要枚数が減っています）'
                           : '\n\n（13枚は「テンパイ＝待ち」の状態です。「待ちを調べる」を使ってください）'));
        return;
      }
      const counts = toCounts(hand);
      const noDeclared = kans.length === 0 && calls.length === 0;
      const res = scoreComplete(counts, buildDeclaredMelds(), noDeclared, ctx);

      if (res.type === 'yakuman') {
        showResult('🀄🀄 役満！\n\n【役】\n' + res.yaku.map(y => ' ・' + y.name).join('\n') +
              '\n\n【' + res.pts.limitName + '】\n' + res.pts.text);
        return;
      }
      if (res.type === 'none') {
        if (!res.isWin) showResult('❌ これはあがれる形ではありません。\n牌を見直してみてください。');
        else showResult('⚠️ あがり形ですが「役」がありません。\n\n麻雀は役が1つもないとあがれません（ドラだけではダメ）。\nリーチや、あがり方（ツモ）などを確認してください。');
        return;
      }

      const lines = res.yaku.map(y => ' ・' + y.name + '　' + y.han + '翻');
      if (ctx.dora > 0) lines.push(' ・ドラ　' + ctx.dora + '翻');
      const fuLines = res.breakdown.map(b => ' ・' + b).join('\n');
      const limit = res.pts.limitName ? '【' + res.pts.limitName + '】\n' : '';
      showResult('🀄 あがり！\n\n【役】\n' + lines.join('\n') +
            '\n\n【符の内訳】\n' + fuLines +
            '\n\n合計：' + res.han + '翻 ' + res.fu + '符\n' + limit +
            '\n' + res.pts.text);
    }

    // ===== ボタン：聴牌時の待ちを調べる =====
    function checkWaits() {
      const ctx = getContext();
      const need = neededTiles();
      if (hand.length !== need - 1) {
        showResult('待ちを調べるには、あがる1枚前の手牌（' + (need - 1) + '枚）にしてください。\n今：' + hand.length + '枚');
        return;
      }
      const noDeclared = kans.length === 0 && calls.length === 0;
      const declaredMelds = buildDeclaredMelds();
      const baseCounts = toCounts(hand);

      const waits = [];
      for (let t = 0; t < 34; t++) {
        if (tileCount(t) >= 4) continue;          // その牌はもう4枚使い切っている
        const c2 = baseCounts.slice(); c2[t]++;   // その牌で1枚補ってみる
        const ctx2 = Object.assign({}, ctx, { winIdx: t });
        const res = scoreComplete(c2, declaredMelds, noDeclared, ctx2);
        const isWin = res.type === 'yakuman' || res.type === 'normal' || (res.type === 'none' && res.isWin);
        if (!isWin) continue;

        let detail;
        if (res.type === 'yakuman') detail = res.yaku.map(y => y.name).join('・') + '（' + res.pts.limitName + '）';
        else if (res.type === 'normal') detail = res.yaku.map(y => y.name).join('・') +
          ' ' + res.han + '翻' + res.fu + '符 / ' + res.pts.text;
        else detail = '役なし（このままではあがれません）';
        waits.push({ name: indexToName(t), detail });
      }

      if (waits.length === 0) {
        showResult('待ちはありません（テンパイしていない形です）。\n手牌を見直してください。');
        return;
      }
      const body = waits.map(w => '【' + w.name + '待ち】\n  ' + w.detail).join('\n\n');
      showResult('🀄 待ち：' + waits.map(w => w.name).join('・') +
            '\n（あがり役は今の「あがりの状況」設定で計算）\n\n' + body);
    }

    renderKans();  // カン欄の初期表示
    renderCalls(); // 鳴き欄の初期表示
    render();      // 最初に一度だけ画面を整える
  </script>
</body>
</html>
